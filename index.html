<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Liquid Glass</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* The colorful moving background shapes */
        .gradient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            opacity: 0.6;
            transition: transform 0.2s ease-out;
        }

        .blob-1 { background: #38bdf8; top: 10%; left: 10%; }
        .blob-2 { background: #818cf8; bottom: 10%; right: 10%; }
        .blob-3 { background: #c084fc; top: 40%; left: 40%; }

        /* The Glass Container */
        .glass-card {
            width: 400px;
            padding: 40px;
            border-radius: 24px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }
        p { opacity: 0.8; line-height: 1.6; }

        /* Liquid Distortion Filter (SVG) */
        .liquid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            mix-blend-mode: overlay;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="gradient-bg">
        <div class="blob blob-1" id="blob1"></div>
        <div class="blob blob-2" id="blob2"></div>
        <div class="blob blob-3" id="blob3"></div>
    </div>

    <div class="glass-card">
        <h1>LIQUID GLASS</h1>
        <p>Move your mouse to distort the environment. This effect uses backdrop-filter blur and dynamic SVG turbulence to simulate refractive glass.</p>
    </div>

    <svg style="display: none;">
        <defs>
            <filter id="liquid">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
            </filter>
        </defs>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Move blobs based on mouse position
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const xPos = (clientX / window.innerWidth) - 0.5;
            const yPos = (clientY / window.innerHeight) - 0.5;

            gsap.to("#blob1", { x: xPos * 100, y: yPos * 100, duration: 1 });
            gsap.to("#blob2", { x: xPos * -150, y: yPos * -150, duration: 1.5 });
            gsap.to("#blob3", { x: xPos * 50, y: yPos * -50, duration: 2 });
        });
    </script>
</body>
</html>
