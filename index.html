<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rendered Glass Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* We need a slightly muted, dynamic background so the white glass highlights actually show up */
            background-color: #f0f4f8;
            background-image: 
                radial-gradient(at 20% 20%, rgba(219, 234, 254, 0.6) 0, transparent 50%), 
                radial-gradient(at 80% 80%, rgba(243, 232, 255, 0.6) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Main Thick Glass Panel */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            
            /* Stacking shadows to create: 
               1. A sharp white top-left highlight (simulates light source)
               2. A subtle inner darkness (simulates glass thickness)
               3. A soft, diffuse drop shadow (simulates floating) */
            box-shadow: 
                inset 1.5px 1.5px 2px rgba(255, 255, 255, 0.9),
                inset -2px -2px 5px rgba(0, 0, 0, 0.03),
                0 20px 40px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* The Colored "Liquid" Blocks */
        .liquid-block {
            position: relative;
            backdrop-filter: blur(10px);
            border-radius: 24px;
            transition: all 0.3s ease;
            
            /* The base gradient provides the core color, but heavily transparent */
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 100%);
            
            /* Intense 3D rendering shadows */
            box-shadow: 
                inset 2px 2px 4px rgba(255, 255, 255, 0.8),    /* Top-left specular highlight */
                inset -4px -4px 8px rgba(0, 0, 0, 0.06),       /* Bottom-right glass thickness */
                inset 0 0 20px rgba(255, 255, 255, 0.4),       /* Overall inner glow */
                0 15px 25px -5px rgba(0, 0, 0, 0.1);           /* Deep drop shadow */
                
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Adding a glossy diagonal "shine" across the blocks to fake a light reflection */
        .liquid-block::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.4) 25%, transparent 30%);
            pointer-events: none; /* So it doesn't block clicks */
        }

        .liquid-block:hover {
            transform: translateY(-4px);
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 1),
                inset -4px -4px 8px rgba(0, 0, 0, 0.08),
                inset 0 0 25px rgba(255, 255, 255, 0.6),
                0 25px 35px -5px rgba(0, 0, 0, 0.15);
        }

        /* Specific Colors applied underneath the glass */
        .color-orange { background-color: rgba(251, 146, 60, 0.2); }
        .color-blue { background-color: rgba(96, 165, 250, 0.2); }
        .color-clear { background-color: rgba(255, 255, 255, 0.1); }

        /* The 3D Glass Buttons */
        .glass-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            /* Pillowed button effect */
            box-shadow: 
                inset 1px 1px 2px rgba(255,255,255,0.9),
                inset -1px -1px 3px rgba(0,0,0,0.05),
                0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .glass-btn:active {
            box-shadow: 
                inset 2px 2px 5px rgba(0,0,0,0.1),
                inset -1px -1px 2px rgba(255,255,255,0.5),
                0 1px 2px rgba(0,0,0,0.05);
            transform: translateY(2px);
        }
    </style>
</head>
<body class="p-8">

    <div class="glass-panel max-w-2xl w-full rounded-[40px] p-10 text-slate-700">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold tracking-tight drop-shadow-sm">Liquid Glass Foundations</h1>
            <div class="flex gap-2">
                <button class="w-10 h-10 rounded-full glass-btn flex items-center justify-center font-bold">+</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-12">
            <div class="liquid-block color-orange h-32 cursor-pointer"></div>
            <div class="liquid-block color-blue h-32 cursor-pointer"></div>
            <div class="liquid-block color-clear h-32 cursor-pointer"></div>
        </div>

        <div class="space-y-6">
            <p class="text-xs font-bold opacity-50 uppercase tracking-widest">Surface 01</p>
            
            <div class="flex flex-wrap gap-4 items-center">
                <button class="px-6 py-3 rounded-2xl glass-btn text-sm font-medium">
                    Glass blur 24
                </button>
                
                <div class="flex gap-2">
                    <span class="w-12 h-12 rounded-full glass-btn flex items-center justify-center text-sm font-bold">4</span>
                    <span class="w-12 h-12 rounded-full glass-btn bg-white/40 flex items-center justify-center text-sm font-bold shadow-inner">12</span>
                    <span class="w-12 h-12 rounded-full glass-btn flex items-center justify-center text-sm font-bold">16</span>
                </div>

                <button class="px-6 py-3 rounded-2xl glass-btn opacity-60 text-sm font-medium">
                    Shadow soft
                </button>
            </div>
        </div>
    </div>

</body>
</html>
