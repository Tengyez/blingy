<!DOCTYPE html>
<html lang="en">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Liquid Glass Interface</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
                    body {
                                    /* Using a mesh gradient background to simulate the image atmosphere */
                                    background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                                                                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                                                                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
                                    background-color: #0f172a;
                                    min-height: 100vh;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                    }

                    .glass-panel {
                                    background: rgba(255, 255, 255, 0.05);
                                    backdrop-filter: blur(24px) saturate(180%);
                                    -webkit-backdrop-filter: blur(24px) saturate(180%);
                                    border: 1px solid rgba(255, 255, 255, 0.1);
                                    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                    }

                    .liquid-card {
                                    background: rgba(255, 255, 255, 0.1);
                                    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                                    border: 1px solid rgba(255, 255, 255, 0.2);
                                    position: relative;
                                    overflow: hidden;
                    }

                    /* The "Glow" effect inside the glass buttons */
                    .liquid-card::before {
                                    content: "";
                                    position: absolute;
                                    top: -50%; left: -50%;
                                    width: 200%; height: 200%;
                                    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
                                    transform: scale(0);
                                    transition: transform 0.6s ease;
                    }

                    .liquid-card:hover::before {
                                    transform: scale(1);
                    }

                    .liquid-card:hover {
                                    transform: translateY(-5px);
                                    background: rgba(255, 255, 255, 0.15);
                                    box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.1);
                    }
                </style>
    </head>
    <body class="p-8">

            <div class="glass-panel max-w-2xl w-full rounded-[40px] p-10 text-white">

                        <div class="flex justify-between items-center mb-10">
                                        <h1 class="text-2xl font-semibold tracking-tight">Liquid Glass Foundations</h1>h1>
                                        <div class="flex gap-2">
                                                            <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center">+</div>div>
                                        </div>div>
                        </div>div>

                        <div class="grid grid-cols-3 gap-6 mb-12">
                                        <div class="liquid-card h-32 rounded-3xl cursor-pointer bg-gradient-to-br from-orange-400/30 to-red-500/20 shadow-[inset_0_0_20px_rgba(251,146,60,0.2)]"></div>div>

                                        <div class="liquid-card h-32 rounded-3xl cursor-pointer bg-gradient-to-br from-blue-400/30 to-indigo-600/20 shadow-[inset_0_0_20px_rgba(96,165,250,0.2)]"></div>div>

                                        <div class="liquid-card h-32 rounded-3xl cursor-pointer border-white/10"></div>div>
                        </div>div>

                        <div class="space-y-6">
                                        <p class="text-sm font-medium opacity-60 uppercase tracking-widest">Surface 01</p>p>

                                        <div class="flex flex-wrap gap-4 items-center">
                                                            <button class="px-6 py-3 rounded-2xl glass-panel text-sm hover:bg-white/10 transition-colors">
                                                                                    Glass blur 24
                                                            </button>button>

                                                            <div class="flex gap-2">
                                                                                    <span class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center text-xs">4</span>span>
                                                                                    <span class="w-10 h-10 rounded-full bg-white/10 border border-white/30 flex items-center justify-center text-xs">12</span>span>
                                                                                    <span class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center text-xs">16</span>span>
                                                            </div>div>

                                                            <button class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-sm opacity-50">
                                                                                    Shadow soft
                                                            </button>button>
                                        </div>div>
                        </div>div>

                        <div class="mt-12">
                                        <p class="text-sm font-medium opacity-60 mb-4">Radius Style</p>p>
                                        <div class="flex gap-4">
                                                            <div class="w-12 h-12 rounded-full border-4 border-dashed border-blue-500 flex items-center justify-center font-bold text-blue-400">16</div>div>
                                                            <div class="w-12 h-12 rounded-full border-4 border-green-500/50 flex items-center justify-center font-bold text-green-400">10</div>div>
                                                            <div class="w-12 h-12 rounded-full border-4 border-orange-500 flex items-center justify-center font-bold text-orange-400">20</div>div>
                                                            <div class="w-12 h-12 rounded-full border-4 border-purple-500/50 flex items-center justify-center font-bold text-purple-400">24</div>div>
                                        </div>div>
                        </div>div>
            </div>div>

    </body>body>
</html>html>

        </style></title>
    </head>
